<script>

    function OpenTab() {
        let menuTab = document.getElementById("menuTab");
        if(menuTab.style.display === "block"){
            menuTab.style.display = "none";
        } else {
            menuTab.style.display = "block";}
            }
            
    function CloseTab() {
        let menuTab = document.getElementById("menuTab");
        menuTab.style.display = "none";
    }
</script>
